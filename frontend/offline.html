<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>오프라인 · 8반 스케줄러</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      background: linear-gradient(160deg, #1e1b4b, #0f172a); color: #e2e8f0; text-align: center; padding: 2rem;
    }
    .wrap { max-width: 360px; animation: fade 0.5s ease; }
    @keyframes fade { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: none; } }
    .icon { width: 88px; height: 88px; margin: 0 auto 1.5rem; border-radius: 24px;
      background: rgba(99,102,241,0.2); display: grid; place-items: center; font-size: 44px; }
    h1 { font-size: 1.4rem; margin-bottom: 0.75rem; }
    p { color: #94a3b8; line-height: 1.6; margin-bottom: 1.5rem; }
    button { background: #6366f1; color: #fff; border: none; padding: 0.8rem 1.6rem;
      border-radius: 999px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: background 0.2s; }
    button:hover { background: #4f46e5; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="icon">📡</div>
    <h1>오프라인 상태입니다</h1>
    <p>인터넷 연결이 끊겼어요.<br />연결을 확인한 뒤 다시 시도해 주세요.</p>
    <button onclick="location.reload()">다시 시도</button>
  </div>
</body>
</html>
