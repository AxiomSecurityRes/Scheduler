<!DOCTYPE html>
<html lang="ko" class="">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="description" content="중1 8반 학급 스케줄러 및 수행평가 관리" />
  <meta name="theme-color" content="#6366f1" />
  <title>8반 스케줄러</title>

  <link rel="manifest" href="/manifest.json" />
  <link rel="apple-touch-icon" href="/icons/icon.svg" />
  <link rel="icon" type="image/svg+xml" href="/icons/icon.svg" />

  <!-- 다크모드 깜빡임 방지: Tailwind 로드 전에 클래스 적용 -->
  <script>
    (function () {
      try {
        var saved = localStorage.getItem("theme");
        var prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
        if (saved === "dark" || (!saved && prefersDark)) {
          document.documentElement.classList.add("dark");
        }
      } catch (e) {}
    })();
  </script>

  <!-- Tailwind CSS (Play CDN) -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            brand: {
              50: "#eef2ff", 100: "#e0e7ff", 200: "#c7d2fe", 300: "#a5b4fc",
              400: "#818cf8", 500: "#6366f1", 600: "#4f46e5", 700: "#4338ca",
              800: "#3730a3", 900: "#312e81",
            },
          },
          fontFamily: {
            sans: ["Pretendard", "-apple-system", "BlinkMacSystemFont", "Segoe UI", "Roboto", "sans-serif"],
          },
          boxShadow: {
            soft: "0 4px 24px -8px rgba(0,0,0,0.12)",
            glow: "0 0 0 3px rgba(99,102,241,0.25)",
          },
          keyframes: {
            "fade-in": { "0%": { opacity: 0, transform: "translateY(8px)" }, "100%": { opacity: 1, transform: "translateY(0)" } },
            "scale-in": { "0%": { opacity: 0, transform: "scale(0.96)" }, "100%": { opacity: 1, transform: "scale(1)" } },
            "slide-up": { "0%": { transform: "translateY(100%)" }, "100%": { transform: "translateY(0)" } },
          },
          animation: {
            "fade-in": "fade-in 0.35s ease-out both",
            "scale-in": "scale-in 0.2s ease-out both",
            "slide-up": "slide-up 0.3s cubic-bezier(0.16,1,0.3,1) both",
          },
        },
      },
    };
  </script>

  <!-- Pretendard 폰트 -->
  <link rel="stylesheet" as="style" crossorigin
        href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
  <link rel="stylesheet" href="/css/styles.css" />
</head>

<body class="min-h-screen bg-slate-50 text-slate-800 dark:bg-slate-950 dark:text-slate-100 antialiased transition-colors duration-300">

  <!-- 토스트 컨테이너 -->
  <div id="toast-root" class="fixed top-4 left-1/2 -translate-x-1/2 z-[100] flex flex-col gap-2 items-center pointer-events-none"></div>

  <!-- 모달 루트 -->
  <div id="modal-root"></div>

  <!-- 앱 루트 -->
  <div id="app" class="min-h-screen flex flex-col"></div>

  <script type="module" src="/js/app.js"></script>
</body>
</html>
